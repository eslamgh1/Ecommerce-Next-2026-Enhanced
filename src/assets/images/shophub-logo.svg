<svg width="160" height="31" viewBox="0 0 160 31" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Shopping Cart Icon -->
  <g transform="translate(0, 5)">
    <!-- Cart Body -->
    <path d="M2 2L4 2L6 14H18L20 6H6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Cart Wheels -->
    <circle cx="8" cy="18" r="2" fill="white"/>
    <circle cx="16" cy="18" r="2" fill="white"/>
    <!-- Cart Handle -->
    <path d="M22 8C22 8 24 6 26 6C28 6 30 8 30 8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Modern Text - ShopHub -->
  <text x="40" y="22" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">ShopHub</text>
  
  <!-- Decorative Element -->
  <circle cx="35" cy="15" r="3" fill="url(#gradient1)" opacity="0.8"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
